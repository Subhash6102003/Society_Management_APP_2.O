name: mgb_heights
description: MGB Heights Society Management App — Flutter Edition
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Backend
  supabase_flutter: ^2.3.4

  # Image picker & display
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # UI
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  badges: ^3.1.2
  file_picker: ^8.0.0+1
  permission_handler: ^11.3.0
  url_launcher: ^6.2.5

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
